# ===================================================================
# midi-map-gm-drums.yaml — Complete General MIDI drum kit
# ===================================================================
#
# A ready-to-use MIDI map that assigns every standard GM percussion
# note (35-81) to its closest matching sample from your instrument
# library, using the reference samples in samples/reference/ for
# similarity scoring.
#
# Each instrument gets console-style channel-strip processing:
#   - High-pass and/or low-pass filters to carve frequency space
#   - Adaptive compression on transient instruments (kicks, snares,
#     toms, hand drums, etc.) — adapts threshold, attack, and release
#     to each sample automatically.  Not applied to cymbals, hi-hats,
#     shakers, or sustained/expressive instruments where it would
#     pump, flatten dynamics, or sound unnatural.
#   - Pan position following standard audience-perspective drum layout
#   - Gain offset to balance the kit
#
# All filters are flat Butterworth (no resonance) for a natural,
# transparent sound.  The similarity engine does the tonal matching;
# filters just keep instruments out of each other's way.
#
# To use: copy this file to midi-map.yaml (or set player.midi_map
# in config.yaml to point here).
#
# GM notes 27-34 (GS/XG electronic percussion) and 82-87 (extended
# percussion) are not covered — no reference samples exist for these.
#
# ===================================================================

assignments:

  # =================================================================
  # KICKS
  # =================================================================

  - name: Kick 2 (Acoustic Bass Drum)
    channel: 10
    notes: 35
    select:
      where:
        reference: samples/reference/GM35_AcousticBassDrum.wav
      order: [{ by: similarity, dir: desc }]
    process:
      - filter_high: { freq: 30 }
      - filter_low: { freq: 8000 }
      - compress: { ratio: 6, attack: 15 }

