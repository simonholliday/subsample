  # KICKS
  # =================================================================

  - name: Kick 2 (Acoustic Bass Drum)
    channel: 10
    notes: 35
    select:
      where:
        reference: GM35_AcousticBassDrum
      order_by: similarity
    process:
      - filter_high: { freq: 30 }
      - filter_low: { freq: 8000 }
      - compress: { ratio: 6, attack: 15 }

